name: Release-Please

# Runs on every push to main. Two responsibilities:
#  1. When new feat:/fix:/BREAKING CHANGE: commits land since the last
#     tag, open or update a Release PR with the proposed version bump,
#     CHANGELOG entry, and manifest update.
#  2. When that Release PR is merged, create a GitHub Release + git tag.
#
# Does NOT publish to npm — that's handled by publish.yml on the
# `release: published` event.

on:
  push:
    branches: [main]

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
